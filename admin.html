<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · TOS Design</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #eeecf1;
      --surface: rgba(255,255,255,0.75);
      --surface2: rgba(255,255,255,0.9);
      --border: rgba(0,0,0,0.08);
      --accent: #7C5CFC;
      --accent2: #4ecca3;
      --text: #1a1a1a;
      --muted: #888892;
      --muted2: #bbbbc4;
    }
    body {
      background:
        radial-gradient(ellipse 65% 55% at 92% 5%, rgba(230,210,205,0.70), transparent),
        radial-gradient(ellipse 70% 65% at 5% 100%, rgba(205,225,195,0.65), transparent),
        #eeecf1;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      min-height: 100vh;
    }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.9rem 2rem; border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.75); backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.95rem; font-weight: 700; letter-spacing: 0.04em;
      text-transform: uppercase; color: var(--accent); text-decoration: none;
    }
    .nav-logo-icon {
      width: 26px; height: 26px; border-radius: 6px;
      background: #7C5CFC; display: flex; align-items: center; justify-content: center;
    }
    .nav-logo-icon svg { width: 14px; height: 14px; }
    .nav-badge { font-size: 0.68rem; padding: 0.22rem 0.65rem; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); background: var(--surface2); letter-spacing: 0.08em; }

    /* Lock screen */
    .lock-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: calc(100vh - 70px);
    }
    .lock-box {
      background: rgba(255,255,255,0.95); border: 1px solid rgba(0,0,0,0.08); border-radius: 1.2rem;
      padding: 2.5rem 2.2rem; width: 100%; max-width: 340px; text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
    }
    .lock-icon { font-size: 2.5rem; margin-bottom: 1.2rem; }
    .lock-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.4rem; color: var(--text); }
    .lock-sub { font-size: 0.8rem; color: var(--muted); margin-bottom: 1.5rem; }
    .form-input {
      background: rgba(255,255,255,0.7); border: 1px solid rgba(0,0,0,0.08); border-radius: 0.6rem;
      padding: 0.65rem 0.9rem; font-size: 0.9rem; color: var(--text); width: 100%;
      outline: none; transition: border-color 0.2s; margin-bottom: 0.9rem; box-sizing: border-box;
    }
    .form-input:focus { border-color: rgba(124,92,252,0.5); }
    .btn-primary {
      width: 100%; padding: 0.75rem; border-radius: 0.65rem; border: none;
      background: var(--accent); color: #fff; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.85; }
    .lock-error { font-size: 0.75rem; color: #ef4444; margin-top: 0.6rem; min-height: 1.2em; }

    /* Dashboard */
    .dashboard { display: none; padding: 2rem 2.5rem; max-width: 1100px; margin: 0 auto; }
    .dashboard-header { margin-bottom: 1.8rem; }
    .dashboard-title { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; color: var(--text); }
    .dashboard-sub { font-size: 0.82rem; color: var(--muted); margin-top: 0.25rem; }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.9rem; margin-bottom: 1.5rem; }
    .stat-card {
      background: rgba(255,255,255,0.85); border: 1px solid rgba(0,0,0,0.07); border-radius: 0.9rem;
      padding: 1.1rem 1.3rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04), inset 0 1px 0 rgba(255,255,255,0.9);
    }
    .stat-label { font-size: 0.68rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.4rem; }
    .stat-value { font-size: 1.8rem; font-weight: 700; }
    .stat-value.pending { color: #f59e0b; }
    .stat-value.approved { color: #3ab08a; }
    .stat-value.total { color: var(--accent); }

    /* Table */
    .table-wrap {
      background: rgba(255,255,255,0.85); border: 1px solid rgba(0,0,0,0.07); border-radius: 0.9rem;
      overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.04), inset 0 1px 0 rgba(255,255,255,0.9);
    }
    .table-header { padding: 1rem 1.4rem; border-bottom: 1px solid rgba(0,0,0,0.06); display: flex; align-items: center; justify-content: space-between; }
    .table-title { font-size: 0.88rem; font-weight: 600; color: var(--text); }
    .btn-refresh { font-size: 0.75rem; padding: 0.3rem 0.75rem; border-radius: 0.4rem; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); cursor: pointer; transition: all 0.2s; }
    .btn-refresh:hover { color: var(--text); border-color: rgba(124,92,252,0.35); }

    table { width: 100%; border-collapse: collapse; }
    th { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; padding: 0.85rem 1.4rem; text-align: left; border-bottom: 1px solid rgba(0,0,0,0.06); }
    td { padding: 0.9rem 1.4rem; font-size: 0.83rem; border-bottom: 1px solid rgba(0,0,0,0.05); color: var(--text); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(124,92,252,0.03); }

    .status-badge {
      display: inline-flex; align-items: center; gap: 0.3rem;
      font-size: 0.68rem; padding: 0.18rem 0.55rem; border-radius: 999px;
      font-weight: 600; letter-spacing: 0.03em;
    }
    .status-pending { background: rgba(245,158,11,0.1); color: #d97706; border: 1px solid rgba(245,158,11,0.25); }
    .status-approved { background: rgba(78,204,163,0.1); color: #3ab08a; border: 1px solid rgba(78,204,163,0.25); }
    .status-rejected { background: rgba(239,68,68,0.1); color: #dc2626; border: 1px solid rgba(239,68,68,0.2); }

    .btn-approve { font-size: 0.72rem; padding: 0.28rem 0.65rem; border-radius: 0.4rem; border: 1px solid rgba(78,204,163,0.3); background: rgba(78,204,163,0.08); color: #3ab08a; cursor: pointer; transition: all 0.2s; margin-right: 0.4rem; }
    .btn-approve:hover { background: rgba(78,204,163,0.18); }
    .btn-reject { font-size: 0.72rem; padding: 0.28rem 0.65rem; border-radius: 0.4rem; border: 1px solid rgba(239,68,68,0.25); background: rgba(239,68,68,0.06); color: #dc2626; cursor: pointer; transition: all 0.2s; }
    .btn-reject:hover { background: rgba(239,68,68,0.12); }

    .empty { text-align: center; padding: 2.5rem; color: var(--muted); font-size: 0.83rem; }

    /* Toast */
    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(12px); background: rgba(255,255,255,0.95); border: 1px solid var(--border); border-radius: 0.7rem; padding: 0.65rem 1.1rem; font-size: 0.82rem; color: var(--text); z-index: 2000; opacity: 0; transition: all 0.25s; pointer-events: none; white-space: nowrap; box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: rgba(78,204,163,0.4); color: #3ab08a; }
    .toast.error { border-color: rgba(239,68,68,0.35); color: #dc2626; }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">
    <span class="nav-logo-icon">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 5C16 5 17.5 10.5 16 13C14.5 10.5 16 5 16 5Z" fill="white" opacity="0.9"/>
        <path d="M16 27C16 27 14.5 21.5 16 19C17.5 21.5 16 27 16 27Z" fill="white" opacity="0.9"/>
        <path d="M5 16C5 16 10.5 14.5 13 16C10.5 17.5 5 16 5 16Z" fill="white" opacity="0.9"/>
        <path d="M27 16C27 16 21.5 17.5 19 16C21.5 14.5 27 16 27 16Z" fill="white" opacity="0.9"/>
        <circle cx="16" cy="16" r="3.5" fill="white"/>
      </svg>
    </span>
    <span>TOS DESIGN</span>
  </a>
  <div class="nav-badge">ADMIN</div>
</nav>

<!-- Lock Screen -->
<div class="lock-screen" id="lock-screen">
  <div class="lock-box">
    <div class="lock-icon">🔐</div>
    <div class="lock-title">管理员入口</div>
    <div class="lock-sub">输入管理员密码继续</div>
    <input class="form-input" id="admin-pwd" type="password" placeholder="管理员密码"
      onkeydown="if(event.key==='Enter')unlock()" />
    <button class="btn-primary" onclick="unlock()">进入后台</button>
    <div class="lock-error" id="lock-error"></div>
  </div>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboard">
  <div class="dashboard-header">
    <div class="dashboard-title">用户管理</div>
    <div class="dashboard-sub">审批注册用户，管理访问权限</div>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">总注册</div>
      <div class="stat-value total" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">待审批</div>
      <div class="stat-value pending" id="stat-pending">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">已通过</div>
      <div class="stat-value approved" id="stat-approved">—</div>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-header">
      <div class="table-title">注册用户</div>
      <button class="btn-refresh" onclick="loadUsers()">↻ 刷新</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>昵称</th>
          <th>邮箱</th>
          <th>注册时间</th>
          <th>状态</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="user-table-body">
        <tr><td colspan="5" class="empty">加载中…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const ADMIN_TOKEN = 'gavin*220499';
  let adminUnlocked = false;

  function unlock() {
    const pwd = document.getElementById('admin-pwd').value;
    if (pwd !== ADMIN_TOKEN) {
      document.getElementById('lock-error').textContent = '密码错误';
      return;
    }
    adminUnlocked = true;
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadUsers();
  }

  async function loadUsers() {
    const tbody = document.getElementById('user-table-body');
    tbody.innerHTML = '<tr><td colspan="5" class="empty">加载中…</td></tr>';
    try {
      const res = await fetch('/api/admin/users', {
        headers: { 'Authorization': `Bearer ${ADMIN_TOKEN}` }
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);
      renderUsers(data.users);
    } catch (e) {
      tbody.innerHTML = `<tr><td colspan="5" class="empty">加载失败：${e.message}</td></tr>`;
    }
  }

  function renderUsers(users) {
    const tbody = document.getElementById('user-table-body');
    document.getElementById('stat-total').textContent = users.length;
    document.getElementById('stat-pending').textContent = users.filter(u => u.status === 'pending').length;
    document.getElementById('stat-approved').textContent = users.filter(u => u.status === 'approved').length;

    if (!users.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">暂无注册用户</td></tr>';
      return;
    }

    tbody.innerHTML = users.map(u => `
      <tr>
        <td><strong>${esc(u.name)}</strong></td>
        <td style="color:var(--muted)">${esc(u.email)}</td>
        <td style="color:var(--muted);font-size:0.78rem">${new Date(u.created_at).toLocaleString('zh-CN')}</td>
        <td><span class="status-badge status-${u.status}">${
          u.status === 'pending' ? '⏳ 待审批' :
          u.status === 'approved' ? '✓ 已通过' : '✕ 已拒绝'
        }</span></td>
        <td>${u.status === 'pending' ? `
          <button class="btn-approve" onclick="action(${u.id},'approve')">✓ 通过</button>
          <button class="btn-reject" onclick="action(${u.id},'reject')">✕ 拒绝</button>
        ` : `<span style="color:var(--muted);font-size:0.78rem">—</span>`}</td>
      </tr>
    `).join('');
  }

  async function action(userId, act) {
    try {
      const res = await fetch('/api/admin/approve', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${ADMIN_TOKEN}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, action: act })
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);
      showToast(act === 'approve' ? '✓ 已通过' : '✕ 已拒绝', act === 'approve' ? 'success' : 'error');
      loadUsers();
    } catch (e) {
      showToast('操作失败：' + e.message, 'error');
    }
  }

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show' + (type ? ' ' + type : '');
    setTimeout(() => t.className = 'toast', 2600);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !adminUnlocked) unlock();
  });
</script>
</body>
</html>
