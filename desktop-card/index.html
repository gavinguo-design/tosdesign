<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>桌面卡片 · TOS Design</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0e0e10;
      --surface: #18181b;
      --surface2: #1e1e24;
      --border: #2a2a2f;
      --accent: #7c6ef7;
      --accent2: #4ecca3;
      --text: #e8e8f0;
      --muted: #6b6b7e;
      --muted2: #4a4a5a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* TOP NAV */
    nav {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.9rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: rgba(14,14,16,0.9);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }

    .nav-back {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.82rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
      padding: 0.3rem 0.6rem;
      border-radius: 0.4rem;
    }

    .nav-back:hover { color: var(--text); background: var(--surface); }

    .nav-divider { color: var(--muted2); }

    .nav-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
    }

    .nav-right {
      margin-left: auto;
      display: flex;
      gap: 0.5rem;
    }

    .btn {
      font-size: 0.78rem;
      padding: 0.4rem 1rem;
      border-radius: 0.5rem;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover { background: var(--surface2); color: var(--text); }

    .btn.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .btn.primary:hover { opacity: 0.85; }

    /* MAIN LAYOUT */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* LEFT: PREVIEW */
    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    .preview-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.7rem 1.2rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .preview-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    .device-switcher {
      display: flex;
      gap: 0.3rem;
    }

    .device-btn {
      width: 28px;
      height: 28px;
      border-radius: 0.4rem;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .device-btn.active, .device-btn:hover {
      background: var(--surface2);
      border-color: var(--border);
      color: var(--text);
    }

    .preview-canvas {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 30% 40%, rgba(124,110,247,0.06) 0%, transparent 50%),
        radial-gradient(circle at 70% 70%, rgba(78,204,163,0.04) 0%, transparent 50%),
        repeating-linear-gradient(0deg, transparent, transparent 24px, rgba(255,255,255,0.02) 24px, rgba(255,255,255,0.02) 25px),
        repeating-linear-gradient(90deg, transparent, transparent 24px, rgba(255,255,255,0.02) 24px, rgba(255,255,255,0.02) 25px);
      overflow: auto;
      padding: 2rem;
    }

    /* THE CARD PREVIEW — 17.0 规范 138×138 */
    .card-preview-wrapper {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    /* 1x 实际尺寸 */
    .tos-card {
      width: 138px;
      height: 138px;
      border-radius: 20px;
      background: #fff;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.1);
      flex-shrink: 0;
      transition: all 0.3s ease;
    }

    /* 2x 放大预览 */
    .tos-card-2x {
      width: 276px;
      height: 276px;
      border-radius: 40px;
      background: #fff;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25), 0 4px 16px rgba(0,0,0,0.12);
      flex-shrink: 0;
      transition: all 0.3s ease;
    }

    .tos-card-scale { transform-origin: top left; }

    .card-scale-label {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Card inner content — positioned absolutely per spec */
    .tos-card-inner {
      position: absolute;
      inset: 0;
    }

    /* 双文本 layout */
    .tos-title {
      position: absolute;
      left: 14px;
      top: 14px;
      width: 110px;
      font-size: 16px;
      font-weight: 600;
      line-height: 1.2;
      color: rgba(0,0,0,0.9);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .tos-subtitle {
      position: absolute;
      left: 14px;
      width: 110px;
      font-size: 12px;
      font-weight: 500;
      line-height: 135%;
      color: rgba(0,0,0,0.6);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    /* 三文本 layout */
    .tos-header {
      position: absolute;
      left: 14px;
      top: 14px;
      width: 110px;
      height: 14px;
      font-size: 12px;
      font-weight: 500;
      color: rgba(0,0,0,0.9);
      overflow: hidden;
      white-space: nowrap;
    }

    .tos-label {
      position: absolute;
      left: 14px;
      top: 30px;
      width: 110px;
      height: 24px;
      font-size: 20px;
      font-weight: 600;
      color: rgba(0,0,0,0.9);
      overflow: hidden;
      white-space: nowrap;
    }

    .tos-subtext {
      position: absolute;
      left: 14px;
      width: 110px;
      height: 12px;
      font-size: 10px;
      font-weight: 500;
      color: rgba(0,0,0,0.6);
      overflow: hidden;
      white-space: nowrap;
    }

    /* 大字体 layout */
    .tos-big-header {
      position: absolute;
      left: 14px;
      top: 14px;
      width: 110px;
      height: 14px;
      font-size: 12px;
      font-weight: 500;
      color: rgba(0,0,0,0.9);
    }

    .tos-big-data {
      position: absolute;
      left: 14px;
      top: 28px;
      width: 110px;
      height: 48px;
      font-size: 40px;
      font-weight: 500;
      color: rgba(0,0,0,0.9);
      line-height: 1;
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .tos-big-unit {
      font-size: 12px;
      font-weight: 600;
      color: rgba(0,0,0,0.9);
      align-self: flex-end;
      padding-bottom: 6px;
    }

    /* 装饰图标（右下角） */
    .tos-deco {
      position: absolute;
      right: 14px;
      bottom: 14px;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      opacity: 0.15;
    }

    /* 按钮 short */
    .tos-btn {
      position: absolute;
      left: 14px;
      bottom: 14px;
      width: 74px;
      height: 30px;
      border-radius: 999px;
      background: rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      color: rgba(0,0,0,0.8);
    }

    /* 暗色卡片 */
    .tos-card-dark, .tos-card-2x.dark {
      background: #1c1c1e;
    }
    .tos-card-dark .tos-title,
    .tos-card-dark .tos-big-data,
    .tos-card-dark .tos-header,
    .tos-card-dark .tos-label,
    .tos-card-dark .tos-big-header { color: rgba(255,255,255,0.9); }
    .tos-card-dark .tos-subtitle,
    .tos-card-dark .tos-subtext { color: rgba(255,255,255,0.6); }
    .tos-card-dark .tos-btn { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.9); }

    /* RIGHT: CHAT */
    .chat-panel {
      width: 360px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 0.9rem 1.2rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .chat-header-title {
      font-size: 0.82rem;
      font-weight: 600;
      margin-bottom: 0.2rem;
    }

    .chat-header-sub {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .msg.user { align-items: flex-end; }
    .msg.bot { align-items: flex-start; }

    .msg-bubble {
      max-width: 85%;
      padding: 0.7rem 1rem;
      border-radius: 1rem;
      font-size: 0.83rem;
      line-height: 1.55;
    }

    .msg.user .msg-bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 0.25rem;
    }

    .msg.bot .msg-bubble {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 0.25rem;
    }

    .msg-time {
      font-size: 0.65rem;
      color: var(--muted2);
    }

    /* Suggestions */
    .suggestions {
      padding: 0 1.2rem 0.8rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .suggestion-chip {
      font-size: 0.75rem;
      padding: 0.35rem 0.8rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .suggestion-chip:hover {
      border-color: rgba(124,110,247,0.4);
      color: var(--accent);
      background: rgba(124,110,247,0.06);
    }

    /* Input */
    .chat-input-area {
      padding: 0.8rem 1.2rem 1rem;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .chat-input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 0.8rem;
      padding: 0.6rem 0.8rem;
      transition: border-color 0.2s;
    }

    .chat-input-wrap:focus-within {
      border-color: rgba(124,110,247,0.4);
    }

    .chat-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 0.85rem;
      resize: none;
      max-height: 100px;
      font-family: inherit;
      line-height: 1.5;
    }

    .chat-input::placeholder { color: var(--muted); }

    .send-btn {
      width: 30px;
      height: 30px;
      border-radius: 0.5rem;
      background: var(--accent);
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }

    .send-btn:hover { opacity: 0.85; }

    /* Typing indicator */
    .typing {
      display: flex;
      gap: 3px;
      align-items: center;
      padding: 0.5rem 0;
    }

    .typing span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--muted);
      animation: typingDot 1.2s ease infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingDot {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-3px); }
    }

    /* scrollbar */
    * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  </style>
</head>
<body>

  <nav>
    <a href="../index.html" class="nav-back">← 返回</a>
    <span class="nav-divider">/</span>
    <span class="nav-title">🃏 桌面卡片</span>
    <div class="nav-right">
      <button class="btn" onclick="exportCard()">导出代码</button>
      <button class="btn primary">保存</button>
    </div>
  </nav>

  <div class="main">

    <!-- LEFT: PREVIEW -->
    <div class="preview-panel">
      <div class="preview-toolbar">
        <span class="preview-label">Preview</span>
        <div class="device-switcher">
          <button class="device-btn active" title="桌面">⬜</button>
          <button class="device-btn" title="手机">📱</button>
          <button class="device-btn" title="深色">🌙</button>
        </div>
      </div>
      <div class="preview-canvas">
        <div class="card-preview-wrapper">
          <!-- 2x 放大版（主预览） -->
          <div class="card-scale-label">2× 预览</div>
          <div class="tos-card-2x" id="previewCard2x">
            <div class="tos-card-inner" id="cardInner2x">
              <!-- 初始空状态，renderCard 调用后会替换 -->
            </div>
          </div>

          <!-- 1x 实际尺寸 -->
          <div class="card-scale-label">1× 实际尺寸</div>
          <div class="tos-card" id="previewCard">
            <div class="tos-card-inner" id="cardInner">
              <!-- 初始空状态 -->
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT: CHAT -->
    <div class="chat-panel">
      <div class="chat-header">
        <div class="chat-header-title">AI 设计助手</div>
        <div class="chat-header-sub">告诉我你想要什么样的卡片</div>
      </div>

      <div class="chat-messages" id="chatMessages">
        <div class="msg bot">
          <div class="msg-bubble">
            你好！我可以帮你设计桌面卡片。<br><br>
            你可以告诉我卡片的用途、数据类型、配色偏好，或者直接说「做一个天气卡片」这样的需求 🎨
          </div>
          <div class="msg-time">刚刚</div>
        </div>
      </div>

      <div class="suggestions" id="suggestions">
        <div class="suggestion-chip" onclick="sendSuggestion(this)">天气卡片</div>
        <div class="suggestion-chip" onclick="sendSuggestion(this)">步数统计</div>
        <div class="suggestion-chip" onclick="sendSuggestion(this)">销售数据</div>
        <div class="suggestion-chip" onclick="sendSuggestion(this)">紫色配色</div>
        <div class="suggestion-chip" onclick="sendSuggestion(this)">简洁风格</div>
      </div>

      <div class="chat-input-area">
        <div class="chat-input-wrap">
          <textarea
            class="chat-input"
            id="chatInput"
            placeholder="描述你想要的卡片..."
            rows="1"
            onkeydown="handleKey(event)"
            oninput="autoResize(this)"
          ></textarea>
          <button class="send-btn" onclick="sendMessage()">↑</button>
        </div>
      </div>
    </div>

  </div>

  <script>
    const cardPresets = {
      '天气': {
        icon: '⛅', title: '今日天气', value: '28°C',
        badge: '多云转晴', color: '#f0a500',
        bars: [40,55,70,65,80,90,75]
      },
      '步数': {
        icon: '👟', title: '今日步数', value: '8,423',
        badge: '↑ 达成目标', color: '#4ecca3',
        bars: [30,50,45,70,60,85,80]
      },
      '销售': {
        icon: '💰', title: '今日销售', value: '¥12,800',
        badge: '↑ 23.1%', color: '#7c6ef7',
        bars: [45,60,55,75,65,90,85]
      },
      '紫色': {
        icon: '🔮', title: '紫色主题', value: '5,921',
        badge: '↑ 8.6%', color: '#a78bfa',
        bars: [35,60,50,80,70,95,65]
      },
      '简洁': {
        icon: '○', title: 'Simple', value: '100',
        badge: 'Clean', color: '#6b6b7e',
        bars: [50,50,50,50,50,50,50]
      }
    };

    // 17.0 规范 renderCard
    function renderCard(data, scale) {
      // scale=1 → 138px, scale=2 → 276px
      const s = scale;
      const layout = data.layout || 'dual'; // single | dual | triple | big
      const color = data.color || '#000';
      const dark = data.dark || false;
      const icon = data.icon || '';

      const inner = document.getElementById(scale === 2 ? 'cardInner2x' : 'cardInner');
      const card = document.getElementById(scale === 2 ? 'previewCard2x' : 'previewCard');
      if (!inner || !card) return;

      card.style.background = dark ? '#1c1c1e' : (data.bg || '#fff');
      inner.innerHTML = '';

      const px = v => (v * s) + 'px';
      const mkEl = (tag, styles, text) => {
        const el = document.createElement(tag);
        Object.assign(el.style, styles);
        if (text !== undefined) el.textContent = text;
        return el;
      };

      if (layout === 'single') {
        // 单文本：一段文字，可对齐顶部或底部
        const el = mkEl('div', {
          position: 'absolute', left: px(14), top: data.alignBottom ? px(105) : px(14),
          width: px(110), fontSize: px(16), fontWeight: '600', lineHeight: '1.2',
          color: dark ? 'rgba(255,255,255,0.9)' : 'rgba(0,0,0,0.9)',
          overflow: 'hidden', display: '-webkit-box', WebkitLineClamp: '4', WebkitBoxOrient: 'vertical'
        }, data.title);
        inner.appendChild(el);
        // 装饰图标
        if (icon) {
          const deco = mkEl('div', {
            position: 'absolute', right: px(14), bottom: px(14),
            width: px(36), height: px(36), borderRadius: px(10),
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: px(20), opacity: '0.15'
          }, icon);
          inner.appendChild(deco);
        }

      } else if (layout === 'dual') {
        // 双文本：title + subtitle
        const titleEl = mkEl('div', {
          position: 'absolute', left: px(14), top: px(14),
          width: px(110), fontSize: px(16), fontWeight: '600', lineHeight: '1.25',
          color: dark ? 'rgba(255,255,255,0.9)' : 'rgba(0,0,0,0.9)',
          overflow: 'hidden', display: '-webkit-box', WebkitLineClamp: '2', WebkitBoxOrient: 'vertical'
        }, data.title);
        inner.appendChild(titleEl);

        // subtitle y = title bottom + 2
        const titleH = data.title && data.title.length > 12 ? 38 : 23;
        const subY = 14 + titleH + 2;
        const subEl = mkEl('div', {
          position: 'absolute', left: px(14), top: px(subY),
          width: px(110), fontSize: px(12), fontWeight: '500', lineHeight: '135%',
          color: dark ? 'rgba(255,255,255,0.6)' : 'rgba(0,0,0,0.6)',
          overflow: 'hidden', display: '-webkit-box', WebkitLineClamp: '2', WebkitBoxOrient: 'vertical'
        }, data.subtitle || '');
        inner.appendChild(subEl);

        // 装饰图标
        if (icon) {
          const deco = mkEl('div', {
            position: 'absolute', right: px(14), bottom: px(14),
            fontSize: px(s === 2 ? 36 : 20), opacity: '0.12'
          }, icon);
          inner.appendChild(deco);
        }

        // 按钮（可选）
        if (data.action) {
          const btn = mkEl('div', {
            position: 'absolute', left: px(14), bottom: px(14),
            width: px(74), height: px(30), borderRadius: '999px',
            background: dark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.08)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: px(12), fontWeight: '600',
            color: dark ? 'rgba(255,255,255,0.9)' : 'rgba(0,0,0,0.8)'
          }, data.action);
          inner.appendChild(btn);
        }

      } else if (layout === 'triple') {
        // 三文本：header + label + subtext
        const headerEl = mkEl('div', {
          position: 'absolute', left: px(14), top: px(14),
          width: px(110), height: px(14), fontSize: px(12), fontWeight: '500',
          color: dark ? 'rgba(255,255,255,0.9)' : 'rgba(0,0,0,0.9)',
          overflow: 'hidden', whiteSpace: 'nowrap'
        }, data.header || data.title);
        inner.appendChild(headerEl);

        const labelEl = mkEl('div', {
          position: 'absolute', left: px(14), top: px(30),
          width: px(110), height: px(24), fontSize: px(20), fontWeight: '600',
          color: dark ? 'rgba(255,255,255,0.9)' : 'rgba(0,0,0,0.9)',
          overflow: 'hidden', whiteSpace: 'nowrap'
        }, data.value || '');
        inner.appendChild(labelEl);

        const subtextEl = mkEl('div', {
          position: 'absolute', left: px(14), top: px(56),
          width: px(110), height: px(12), fontSize: px(10), fontWeight: '500',
          color: dark ? 'rgba(255,255,255,0.6)' : 'rgba(0,0,0,0.6)',
          overflow: 'hidden', whiteSpace: 'nowrap'
        }, data.subtitle || '');
        inner.appendChild(subtextEl);

        if (icon) {
          const deco = mkEl('div', {
            position: 'absolute', right: px(14), bottom: px(14),
            fontSize: px(s === 2 ? 36 : 20), opacity: '0.12'
          }, icon);
          inner.appendChild(deco);
        }

      } else if (layout === 'big') {
        // 大字体文本
        const headerEl = mkEl('div', {
          position: 'absolute', left: px(14), top: px(14),
          width: px(110), height: px(14), fontSize: px(12), fontWeight: '500',
          color: dark ? 'rgba(255,255,255,0.9)' : 'rgba(0,0,0,0.9)'
        }, data.header || data.title);
        inner.appendChild(headerEl);

        const dataWrap = mkEl('div', {
          position: 'absolute', left: px(14), top: px(28),
          width: px(110), height: px(48),
          display: 'flex', alignItems: 'flex-end', gap: px(2)
        });
        const dataEl = mkEl('span', {
          fontSize: px(40), fontWeight: '500', lineHeight: '1',
          color: data.accentColor || (dark ? 'rgba(255,255,255,0.9)' : 'rgba(0,0,0,0.9)')
        }, data.value || '');
        dataWrap.appendChild(dataEl);
        if (data.unit) {
          const unitEl = mkEl('span', {
            fontSize: px(12), fontWeight: '600', paddingBottom: px(6),
            color: dark ? 'rgba(255,255,255,0.9)' : 'rgba(0,0,0,0.9)'
          }, data.unit);
          dataWrap.appendChild(unitEl);
        }
        inner.appendChild(dataWrap);

        if (data.subtitle) {
          const sub1 = mkEl('div', {
            position: 'absolute', left: px(14), top: px(98),
            width: px(110), height: px(12), fontSize: px(10), fontWeight: '500',
            color: dark ? 'rgba(255,255,255,0.6)' : 'rgba(0,0,0,0.6)', overflow: 'hidden', whiteSpace: 'nowrap'
          }, data.subtitle);
          inner.appendChild(sub1);
        }
        if (data.subtitle2) {
          const sub2 = mkEl('div', {
            position: 'absolute', left: px(14), top: px(112),
            width: px(110), height: px(12), fontSize: px(10), fontWeight: '500',
            color: dark ? 'rgba(255,255,255,0.6)' : 'rgba(0,0,0,0.6)', overflow: 'hidden', whiteSpace: 'nowrap'
          }, data.subtitle2);
          inner.appendChild(sub2);
        }
      }

      // 颜色 accent 应用到关键数据
      if (data.accentColor) {
        const valueEls = inner.querySelectorAll('.tos-label, .tos-big-data');
        valueEls.forEach(el => el.style.color = data.accentColor);
      }
    }

    function applyPreset(data) {
      renderCard(data, 1);
      renderCard(data, 2);
    }

    function addMsg(text, type) {
      const container = document.getElementById('chatMessages');
      const div = document.createElement('div');
      div.className = `msg ${type}`;
      const now = new Date().toLocaleTimeString('zh', {hour:'2-digit', minute:'2-digit'});
      div.innerHTML = `<div class="msg-bubble">${text}</div><div class="msg-time">${now}</div>`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function addTyping() {
      const container = document.getElementById('chatMessages');
      const div = document.createElement('div');
      div.className = 'msg bot';
      div.id = 'typing-indicator';
      div.innerHTML = `<div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    function getBotReply(text) {
      const lower = text.toLowerCase();
      let preset = null;
      let reply = '';

      if (lower.includes('天气')) {
        preset = cardPresets['天气'];
        reply = '好的！我帮你做了一个天气卡片 ⛅<br>显示今日温度和天气趋势，配色用了暖橙色。你想调整温度数据或者改变配色吗？';
      } else if (lower.includes('步数') || lower.includes('运动') || lower.includes('健康')) {
        preset = cardPresets['步数'];
        reply = '运动数据卡片来了 👟<br>绿色代表健康活力，今日步数 8,423 步，已达成目标！需要换个数据或风格吗？';
      } else if (lower.includes('销售') || lower.includes('数据') || lower.includes('收入')) {
        preset = cardPresets['销售'];
        reply = '销售数据卡片搞定 💰<br>紫色主题，今日销售额 ¥12,800，同比上涨 23.1%。想调整数值或图表样式吗？';
      } else if (lower.includes('紫')) {
        preset = cardPresets['紫色'];
        reply = '紫色配色已应用 🔮<br>整体偏向紫罗兰色系，高端感十足。需要深紫还是浅紫？';
      } else if (lower.includes('简洁') || lower.includes('极简') || lower.includes('minimal')) {
        preset = cardPresets['简洁'];
        reply = '极简风格来了 ○<br>去掉了所有装饰，只留核心数据。感觉怎么样？';
      } else {
        reply = '收到你的需求！我正在理解中...<br><br>你可以更具体地描述，比如：<br>• 「做一个蓝色的步数卡片」<br>• 「卡片要显示今日销售额」<br>• 「风格要更简洁」';
      }

      return { preset, reply };
    }

    const chatHistory = [];

    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;

      addMsg(text, 'user');
      chatHistory.push({ role: 'user', content: text });
      input.value = '';
      input.style.height = '';
      document.getElementById('suggestions').style.display = 'none';

      addTyping();
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: chatHistory }),
        });
        const data = await res.json();
        removeTyping();

        if (!data.ok) {
          addMsg('出错了：' + (data.error || '请重试'), 'bot');
          return;
        }

        const reply = data.text;
        chatHistory.push({ role: 'assistant', content: reply });

        // Parse card-update block if present
        const cardMatch = reply.match(/```card-update\n([\s\S]*?)```/);
        let displayReply = reply.replace(/```card-update\n[\s\S]*?```/g, '').trim();
        addMsg(displayReply || '卡片已更新 ✨', 'bot');

        if (cardMatch) {
          try {
            const cardData = JSON.parse(cardMatch[1]);
            // Pass all fields directly to applyPreset → renderCard
            applyPreset(cardData);
          } catch(e) { console.warn('card parse error', e); }
        }
      } catch(e) {
        removeTyping();
        addMsg('网络错误，请重试', 'bot');
      }
    }

    function sendSuggestion(el) {
      document.getElementById('chatInput').value = el.textContent;
      sendMessage();
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function autoResize(el) {
      el.style.height = '';
      el.style.height = Math.min(el.scrollHeight, 100) + 'px';
    }

    function exportCard() {
      alert('导出功能即将上线 🚀');
    }

    // Init default card
    applyPreset({
      layout: 'dual',
      title: '告诉我你想要的卡片',
      subtitle: '比如「天气卡片」或「步数统计」',
      icon: '🃏',
      bg: '#fff',
      dark: false
    });
  </script>

</body>
</html>
