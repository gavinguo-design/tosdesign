<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>桌面卡片 · TOS Design</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0e0e10;
      --surface: #18181b;
      --surface2: #1e1e24;
      --border: #2a2a2f;
      --accent: #7c6ef7;
      --accent2: #4ecca3;
      --text: #e8e8f0;
      --muted: #6b6b7e;
      --muted2: #4a4a5a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* TOP NAV */
    nav {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.9rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: rgba(14,14,16,0.9);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
      z-index: 10;
      position: relative;
    }

    .nav-back {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.82rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
      padding: 0.3rem 0.6rem;
      border-radius: 0.4rem;
    }
    .nav-back:hover { color: var(--text); background: var(--surface); }
    .nav-divider { color: var(--muted2); }
    .nav-title { font-size: 0.9rem; font-weight: 600; color: var(--text); }
    .nav-right { margin-left: auto; display: flex; gap: 0.5rem; }

    .btn {
      font-size: 0.78rem;
      padding: 0.4rem 1rem;
      border-radius: 0.5rem;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover { background: var(--surface2); color: var(--text); }
    .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn.primary:hover { opacity: 0.85; }

    /* MAIN LAYOUT */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* ─── LEFT FLOATING AREA ─── */
    .left-dock {
      position: absolute;
      left: 20px;
      top: 20px;
      bottom: 20px;
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 10px;
      z-index: 20;
      pointer-events: none; /* let clicks pass through gaps */
    }

    /* CHAT PANEL — floating glass */
    .chat-panel {
      width: 320px;
      max-height: calc(100vh - 120px);
      display: flex;
      flex-direction: column;
      background: rgba(18, 18, 22, 0.85);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.45), 0 1px 0 rgba(255,255,255,0.06) inset;
      pointer-events: all;
      flex-shrink: 0;
    }

    .chat-header {
      padding: 0.9rem 1.1rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      cursor: default;
      user-select: none;
    }

    .chat-drag-handle {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 7px;
      background: rgba(124,110,247,0.15);
      cursor: grab;
      flex-shrink: 0;
    }
    .chat-drag-handle:active { cursor: grabbing; }
    .chat-drag-handle svg { opacity: 0.6; }

    .chat-header-text { flex: 1; }
    .chat-header-title { font-size: 0.82rem; font-weight: 600; }
    .chat-header-sub { font-size: 0.7rem; color: var(--muted); margin-top: 1px; }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      min-height: 0;
    }
    .chat-messages::-webkit-scrollbar { width: 3px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg { display: flex; flex-direction: column; gap: 0.25rem; }
    .msg.user { align-items: flex-end; }
    .msg.bot { align-items: flex-start; }

    .msg-bubble {
      max-width: 90%;
      padding: 0.6rem 0.9rem;
      border-radius: 1rem;
      font-size: 0.82rem;
      line-height: 1.55;
    }
    .msg.user .msg-bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 0.25rem;
    }
    .msg.bot .msg-bubble {
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.07);
      border-bottom-left-radius: 0.25rem;
    }
    .msg-time { font-size: 0.62rem; color: var(--muted2); }

    /* Suggestions */
    .suggestions {
      padding: 0 1rem 0.6rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      flex-shrink: 0;
    }
    .suggestion-chip {
      font-size: 0.72rem;
      padding: 0.28rem 0.7rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .suggestion-chip:hover {
      border-color: rgba(124,110,247,0.4);
      color: var(--accent);
      background: rgba(124,110,247,0.08);
    }

    /* Input */
    .chat-input-area {
      padding: 0.7rem 1rem 0.9rem;
      border-top: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .chat-input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 0.4rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 0.75rem;
      padding: 0.5rem 0.7rem;
      transition: border-color 0.2s;
    }
    .chat-input-wrap:focus-within { border-color: rgba(124,110,247,0.4); }
    .chat-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 0.82rem;
      resize: none;
      max-height: 90px;
      font-family: inherit;
      line-height: 1.5;
    }
    .chat-input::placeholder { color: var(--muted); }
    .send-btn {
      width: 28px;
      height: 28px;
      border-radius: 0.45rem;
      background: var(--accent);
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }
    .send-btn:hover { opacity: 0.85; }

    /* Typing indicator */
    .typing { display: flex; gap: 3px; align-items: center; padding: 0.4rem 0; }
    .typing span {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--muted);
      animation: typingDot 1.2s ease infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingDot {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-3px); }
    }

    /* ─── PROGRESS PANEL ─── */
    .progress-panel {
      width: 260px;
      max-height: calc(100vh - 120px);
      display: flex;
      flex-direction: column;
      background: rgba(16, 16, 20, 0.88);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      pointer-events: all;
      flex-shrink: 0;
      /* hidden by default, slide in */
      opacity: 0;
      transform: translateX(-10px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
    }
    .progress-panel.visible {
      opacity: 1;
      transform: translateX(0);
      pointer-events: all;
    }

    .progress-header {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .progress-title {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text);
    }
    .progress-close {
      width: 22px; height: 22px;
      border-radius: 6px;
      background: rgba(255,255,255,0.06);
      border: none; color: var(--muted);
      cursor: pointer; font-size: 0.75rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .progress-close:hover { background: rgba(255,255,255,0.12); color: var(--text); }

    .progress-steps {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .progress-steps::-webkit-scrollbar { width: 3px; }
    .progress-steps::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .step-item {
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.06);
      overflow: hidden;
      background: rgba(255,255,255,0.03);
      transition: border-color 0.2s;
    }
    .step-item:hover { border-color: rgba(255,255,255,0.1); }

    .step-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 0.75rem;
      cursor: pointer;
      user-select: none;
    }

    .step-status {
      width: 18px; height: 18px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem;
      flex-shrink: 0;
      transition: all 0.3s;
    }
    .step-status.pending {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .step-status.running {
      background: rgba(124,110,247,0.2);
      border: 1px solid rgba(124,110,247,0.4);
      animation: pulse 1s ease infinite;
    }
    .step-status.done {
      background: rgba(78,204,163,0.15);
      border: 1px solid rgba(78,204,163,0.35);
      color: #4ecca3;
    }
    .step-status.error {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.35);
      color: #ef4444;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .step-name {
      flex: 1;
      font-size: 0.76rem;
      color: var(--text);
      font-weight: 500;
    }
    .step-name.pending { color: var(--muted); }
    .step-name.done { color: var(--text); }

    .step-expand-icon {
      font-size: 0.6rem;
      color: var(--muted);
      transition: transform 0.2s;
    }
    .step-item.expanded .step-expand-icon { transform: rotate(180deg); }

    /* Step detail / micro-adjust panel */
    .step-detail {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .step-item.expanded .step-detail {
      max-height: 200px;
    }

    .step-detail-inner {
      padding: 0 0.75rem 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding-top: 0.6rem;
    }

    .step-result {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.5;
      background: rgba(0,0,0,0.2);
      padding: 0.5rem 0.6rem;
      border-radius: 7px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .step-adjust-label {
      font-size: 0.67rem;
      color: var(--muted2);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .step-adjust-input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 7px;
      padding: 0.45rem 0.6rem;
      color: var(--text);
      font-size: 0.72rem;
      font-family: inherit;
      outline: none;
      resize: none;
      line-height: 1.4;
      transition: border-color 0.2s;
    }
    .step-adjust-input:focus { border-color: rgba(124,110,247,0.4); }

    .step-adjust-btn {
      align-self: flex-end;
      font-size: 0.68rem;
      padding: 0.28rem 0.75rem;
      border-radius: 6px;
      background: rgba(124,110,247,0.2);
      border: 1px solid rgba(124,110,247,0.35);
      color: var(--accent);
      cursor: pointer;
      transition: all 0.15s;
    }
    .step-adjust-btn:hover { background: rgba(124,110,247,0.3); }

    /* ─── RIGHT: PREVIEW ─── */
    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .preview-toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0.7rem 1.2rem;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    /* Mode switcher tabs */
    .mode-switcher {
      display: flex;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
    }
    .mode-btn {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.73rem;
      padding: 0.3rem 0.75rem;
      border-radius: 5px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .mode-btn.active {
      background: rgba(124,110,247,0.2);
      color: var(--accent);
      border: 1px solid rgba(124,110,247,0.3);
    }
    .mode-btn:hover:not(.active) {
      background: rgba(255,255,255,0.06);
      color: var(--text);
    }

    .device-switcher {
      display: flex;
      gap: 0.3rem;
    }
    .device-btn {
      width: 28px; height: 28px;
      border-radius: 0.4rem;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .device-btn.active, .device-btn:hover {
      background: var(--surface2);
      border-color: var(--border);
      color: var(--text);
    }

    /* CANVAS */
    .preview-canvas {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 30% 40%, rgba(124,110,247,0.06) 0%, transparent 50%),
        radial-gradient(circle at 70% 70%, rgba(78,204,163,0.04) 0%, transparent 50%),
        repeating-linear-gradient(0deg, transparent, transparent 24px, rgba(255,255,255,0.02) 24px, rgba(255,255,255,0.02) 25px),
        repeating-linear-gradient(90deg, transparent, transparent 24px, rgba(255,255,255,0.02) 24px, rgba(255,255,255,0.02) 25px);
      overflow: auto;
      padding: 2rem;
    }

    /* ─── CARD PREVIEW MODE ─── */
    .card-preview-wrapper {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }
    .card-scale-label {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* 1x */
    .tos-card {
      width: 138px; height: 138px;
      border-radius: 20px; background: #fff;
      position: relative; overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.1);
      flex-shrink: 0; transition: all 0.3s ease;
    }
    /* 2x */
    .tos-card-2x {
      width: 276px; height: 276px;
      border-radius: 40px; background: #fff;
      position: relative; overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25), 0 4px 16px rgba(0,0,0,0.12);
      flex-shrink: 0; transition: all 0.3s ease;
    }
    .tos-card-inner { position: absolute; inset: 0; }

    /* ─── PHONE MOCKUP MODE ─── */
    .phone-preview-wrapper {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .phone-preview-wrapper.visible { display: flex; }
    .card-preview-wrapper.hidden { display: none; }

    .phone-mockup {
      width: 280px;
      height: 602px;
      border-radius: 0;
      background: transparent;
      border: none;
      position: relative;
      overflow: visible;
      box-shadow: none;
    }
    .phone-mockup-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      z-index: 2;
    }

    /* Phone notch */
    .phone-notch {
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 100px; height: 30px;
      background: #1a1a1a;
      border-radius: 0 0 20px 20px;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .notch-camera {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #333;
      border: 1px solid #444;
    }
    .notch-sensor {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: #2a2a2a;
    }

    /* Phone wallpaper / home screen */
    .phone-screen {
      position: absolute;
      inset: 0;
      background: transparent;
      z-index: 1;
    }

    /* Widget — single absolute positioned card */
    .phone-widget-area {
      position: absolute;
      top: 146px;
      right: 28px;
      width: 94px;
      height: 94px;
      z-index: 3;
    }
    .phone-widget {
      width: 94px; height: 94px;
      border-radius: 14px;
      position: relative;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    }

    /* Placeholder wallpaper text */
    .phone-placeholder-text {
      position: absolute;
      bottom: 60px;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.6rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.1em;
    }

    /* Phone home indicator */
    .phone-indicator {
      position: absolute;
      bottom: 10px;
      left: 50%; transform: translateX(-50%);
      width: 80px; height: 4px;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
    }

    /* Phone mockup label */
    .phone-mockup-note {
      font-size: 0.68rem;
      color: var(--muted);
      text-align: center;
    }

    /* Card inner layouts (same as original) */
    .tos-big-data {
      position: absolute; left: 14px; top: 28px;
      width: 110px; height: 48px;
      font-size: 40px; font-weight: 500; color: rgba(0,0,0,0.9);
      line-height: 1;
      display: flex; align-items: center; gap: 2px;
    }
    .tos-big-unit {
      font-size: 12px; font-weight: 600; color: rgba(0,0,0,0.9);
      align-self: flex-end; padding-bottom: 6px;
    }
    .tos-deco {
      position: absolute; right: 14px; bottom: 14px;
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; opacity: 0.15;
    }

    /* Dark card */
    .dark-card { background: #1c1c1e !important; }

    * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    /* ─── LOGIN OVERLAY ─── */
    #loginOverlay {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(8,8,12,0.85);
      backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
    }
    #loginOverlay.hidden { display: none; }
    .login-box {
      background: rgba(20,20,26,0.95);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 2rem 2.2rem;
      width: 320px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .login-logo { font-size: 2rem; text-align: center; margin-bottom: 0.4rem; }
    .login-title { text-align: center; font-size: 1.1rem; font-weight: 600; color: var(--text); margin-bottom: 0.2rem; }
    .login-sub { text-align: center; font-size: 0.75rem; color: var(--muted); margin-bottom: 1.5rem; }
    .login-field { margin-bottom: 0.9rem; }
    .login-field label { display: block; font-size: 0.72rem; color: var(--muted); margin-bottom: 0.3rem; }
    .login-field input {
      width: 100%; box-sizing: border-box;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 0.55rem 0.8rem;
      color: var(--text); font-size: 0.9rem;
      outline: none; transition: border 0.2s;
    }
    .login-field input:focus { border-color: rgba(124,110,247,0.5); }
    .login-btn {
      width: 100%; padding: 0.65rem;
      background: var(--accent); border: none; border-radius: 10px;
      color: #fff; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; margin-top: 0.3rem;
      transition: opacity 0.2s;
    }
    .login-btn:hover { opacity: 0.85; }
    .login-err { color: #ff6b6b; font-size: 0.75rem; text-align: center; margin-top: 0.6rem; min-height: 1em; }
    .login-switch { text-align: center; font-size: 0.75rem; color: var(--muted); margin-top: 0.9rem; }
    .login-switch a { color: var(--accent); cursor: pointer; text-decoration: none; }
    .login-user-bar {
      position: fixed; top: 14px; right: 16px; z-index: 50;
      display: flex; align-items: center; gap: 8px;
      background: rgba(20,20,26,0.7); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px; padding: 5px 12px 5px 8px;
      backdrop-filter: blur(10px);
    }
    .login-user-bar.hidden { display: none; }
    .login-avatar {
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--accent); display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 700; color: #fff;
    }
    .login-uname { font-size: 0.78rem; color: var(--text); }
    .login-logout { font-size: 0.72rem; color: var(--muted); cursor: pointer; margin-left: 4px; }
    .login-logout:hover { color: #ff6b6b; }
  </style>
</head>
<body>

  <!-- LOGIN OVERLAY -->
  <div id="loginOverlay">
    <div class="login-box">
      <div class="login-logo">🎨</div>
      <div class="login-title">TOS Design</div>
      <div class="login-sub" id="loginSubtitle">AI 卡片设计工具</div>
      <div id="loginForm">
        <div class="login-field"><label>邮箱</label><input type="email" id="loginEmail" placeholder="your@email.com" /></div>
        <div class="login-field"><label>密码</label><input type="password" id="loginPassword" placeholder="至少6位" /></div>
        <button class="login-btn" onclick="doLogin()">登录</button>
        <div class="login-err" id="loginErr"></div>
        <div class="login-switch">还没有账号？<a onclick="showRegister()"> 立即注册</a></div>
      </div>
      <div id="registerForm" style="display:none">
        <div class="login-field"><label>姓名</label><input type="text" id="regName" placeholder="你的名字" /></div>
        <div class="login-field"><label>邮箱</label><input type="email" id="regEmail" placeholder="your@email.com" /></div>
        <div class="login-field"><label>密码</label><input type="password" id="regPassword" placeholder="至少6位" /></div>
        <button class="login-btn" onclick="doRegister()">注册</button>
        <div class="login-err" id="registerErr"></div>
        <div class="login-switch">已有账号？<a onclick="showLogin()"> 返回登录</a></div>
      </div>
    </div>
  </div>

  <!-- USER BAR -->
  <div class="login-user-bar hidden" id="userBar">
    <div class="login-avatar" id="userAvatar"></div>
    <span class="login-uname" id="userName"></span>
    <span class="login-logout" onclick="doLogout()">退出</span>
  </div>

  <nav>
    <a href="../index.html" class="nav-back">← 返回</a>
    <span class="nav-divider">/</span>
    <span class="nav-title">🃏 桌面卡片</span>
    <div class="nav-right">
      <button class="btn" onclick="exportCard()">导出代码</button>
      <button class="btn primary">保存</button>
    </div>
  </nav>

  <div class="main">

    <!-- LEFT FLOATING DOCK: Chat + Progress -->
    <div class="left-dock">

      <!-- CHAT PANEL -->
      <div class="chat-panel" id="chatPanel">
        <div class="chat-header" id="chatDragHandle">
          <div class="chat-drag-handle">
            <svg width="10" height="12" viewBox="0 0 10 12" fill="none">
              <circle cx="2.5" cy="2" r="1.5" fill="currentColor"/>
              <circle cx="7.5" cy="2" r="1.5" fill="currentColor"/>
              <circle cx="2.5" cy="6" r="1.5" fill="currentColor"/>
              <circle cx="7.5" cy="6" r="1.5" fill="currentColor"/>
              <circle cx="2.5" cy="10" r="1.5" fill="currentColor"/>
              <circle cx="7.5" cy="10" r="1.5" fill="currentColor"/>
            </svg>
          </div>
          <div class="chat-header-text">
            <div class="chat-header-title">AI 设计助手</div>
            <div class="chat-header-sub">告诉我你想要什么样的卡片</div>
          </div>
        </div>

        <div class="chat-messages" id="chatMessages">
          <div class="msg bot">
            <div class="msg-bubble">
              你好！我可以帮你设计桌面卡片。<br><br>
              告诉我卡片的用途、数据类型、配色偏好，或者直接说「做一个天气卡片」🎨
            </div>
            <div class="msg-time">刚刚</div>
          </div>
        </div>

        <div class="suggestions" id="suggestions">
          <div class="suggestion-chip" onclick="sendSuggestion(this)">天气卡片</div>
          <div class="suggestion-chip" onclick="sendSuggestion(this)">步数统计</div>
          <div class="suggestion-chip" onclick="sendSuggestion(this)">销售数据</div>
          <div class="suggestion-chip" onclick="sendSuggestion(this)">紫色配色</div>
          <div class="suggestion-chip" onclick="sendSuggestion(this)">简洁风格</div>
        </div>

        <div class="chat-input-area">
          <div class="chat-input-wrap">
            <textarea
              class="chat-input"
              id="chatInput"
              placeholder="描述你想要的卡片..."
              rows="1"
              onkeydown="handleKey(event)"
              oninput="autoResize(this)"
            ></textarea>
            <button class="send-btn" onclick="sendMessage()">↑</button>
          </div>
        </div>
      </div>

      <!-- PROGRESS PANEL -->
      <div class="progress-panel" id="progressPanel">
        <div class="progress-header">
          <span class="progress-title">Widget skill</span>
          <button class="progress-close" onclick="hideProgress()">✕</button>
        </div>
        <div class="progress-steps" id="progressSteps">
          <!-- Steps injected by JS -->
        </div>
      </div>

    </div>

    <!-- RIGHT: PREVIEW -->
    <div class="preview-panel">
      <div class="preview-toolbar">
        <!-- Preview mode switcher -->
        <div class="mode-switcher">
          <button class="mode-btn active" id="modeCard" onclick="switchMode('card')">
            <span>⬜</span> 卡片
          </button>
          <button class="mode-btn" id="modePhone" onclick="switchMode('phone')">
            <span>📱</span> 手机预览
          </button>
        </div>
        <div class="device-switcher">
          <button class="device-btn active" id="themeLight" title="浅色" onclick="switchTheme('light')">☀️</button>
          <button class="device-btn" id="themeDark" title="深色" onclick="switchTheme('dark')">🌙</button>
        </div>
      </div>

      <div class="preview-canvas" id="previewCanvas">

        <!-- CARD MODE -->
        <div class="card-preview-wrapper" id="cardPreviewWrapper">
          <div class="card-scale-label">2× 预览</div>
          <div class="tos-card-2x" id="previewCard2x">
            <div class="tos-card-inner" id="cardInner2x"></div>
          </div>
        </div>

        <!-- PHONE MOCKUP MODE -->
        <div class="phone-preview-wrapper" id="phonePreviewWrapper">
          <div class="phone-mockup">
            <img class="phone-mockup-img" src="./assets/phone-mockup.png" alt="phone mockup" />
            <div class="phone-widget-area">
              <div class="phone-widget" id="phoneWidget1">
                <div class="tos-card-inner" id="phoneCardInner1" style="transform:scale(0.681);transform-origin:top left;width:147%;height:147%;"></div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>

  <script>
    // ─── STATE ───────────────────────────────────────────
    let currentCardData = null;
    let currentTheme = 'light';
    let currentMode = 'card';

    const SKILL_STEPS = [
      { id: 'analyze',   name: '需求分析',   desc: null },
      { id: 'tone',      name: '调性分析',   desc: null },
      { id: 'layout',    name: '布局规划',   desc: null },
      { id: 'color',     name: '配色方案',   desc: null },
      { id: 'illust',    name: '插图生成',   desc: null },
      { id: 'render',    name: '卡片渲染',   desc: null },
    ];

    // ─── MODE SWITCH ──────────────────────────────────────
    function switchMode(mode) {
      currentMode = mode;
      document.getElementById('modeCard').classList.toggle('active', mode === 'card');
      document.getElementById('modePhone').classList.toggle('active', mode === 'phone');
      document.getElementById('cardPreviewWrapper').classList.toggle('hidden', mode !== 'card');
      document.getElementById('phonePreviewWrapper').classList.toggle('visible', mode === 'phone');
    }

    function switchTheme(theme) {
      currentTheme = theme;
      document.getElementById('themeLight').classList.toggle('active', theme === 'light');
      document.getElementById('themeDark').classList.toggle('active', theme === 'dark');
      if (currentCardData) {
        applyPreset({ ...currentCardData, dark: theme === 'dark' });
      }
    }

    // ─── PROGRESS PANEL ──────────────────────────────────
    function showProgress() {
      document.getElementById('progressPanel').classList.add('visible');
      document.getElementById('previewCanvas').style.paddingLeft = '300px';
    }
    function hideProgress() {
      document.getElementById('progressPanel').classList.remove('visible');
      document.getElementById('previewCanvas').style.paddingLeft = '';
    }

    function renderSteps(states) {
      // states: { id: 'pending'|'running'|'done'|'error', desc: '...' }
      const container = document.getElementById('progressSteps');
      container.innerHTML = '';
      SKILL_STEPS.forEach(step => {
        const state = states[step.id] || { status: 'pending', desc: null };
        const statusIcon = state.status === 'done' ? '✓'
          : state.status === 'running' ? '·'
          : state.status === 'error' ? '✕' : '';
        const nameClass = state.status === 'pending' ? 'pending' : 'done';

        const el = document.createElement('div');
        el.className = 'step-item';
        el.id = `step-${step.id}`;
        el.innerHTML = `
          <div class="step-header" onclick="toggleStep('${step.id}')">
            <div class="step-status ${state.status}">
              <span>${statusIcon}</span>
            </div>
            <div class="step-name ${nameClass}">${step.name}</div>
            <span class="step-expand-icon">▾</span>
          </div>
          <div class="step-detail">
            <div class="step-detail-inner">
              ${state.desc ? `<div class="step-result">${state.desc}</div>` : '<div class="step-result" style="color:var(--muted2)">—</div>'}
              <div class="step-adjust-label">微调指令</div>
              <textarea class="step-adjust-input" rows="2" placeholder="描述你想调整的内容..."></textarea>
              <button class="step-adjust-btn" onclick="rerunStep('${step.id}', this)">重新生成 ↺</button>
            </div>
          </div>
        `;
        container.appendChild(el);
      });
    }

    function updateStep(stepId, status, desc) {
      const el = document.getElementById(`step-${stepId}`);
      if (!el) return;
      const statusEl = el.querySelector('.step-status');
      const nameEl = el.querySelector('.step-name');
      const resultEl = el.querySelector('.step-result');

      statusEl.className = `step-status ${status}`;
      statusEl.innerHTML = `<span>${status === 'done' ? '✓' : status === 'running' ? '·' : status === 'error' ? '✕' : ''}</span>`;
      nameEl.className = `step-name ${status === 'pending' ? 'pending' : 'done'}`;
      if (resultEl && desc) resultEl.innerHTML = desc;
    }

    function toggleStep(stepId) {
      const el = document.getElementById(`step-${stepId}`);
      if (el) el.classList.toggle('expanded');
    }

    function rerunStep(stepId, btn) {
      const item = document.getElementById(`step-${stepId}`);
      const input = item.querySelector('.step-adjust-input');
      const instruction = input.value.trim();
      btn.textContent = '处理中...';
      btn.disabled = true;
      updateStep(stepId, 'running', null);
      // TODO: hook into actual API with instruction override
      setTimeout(() => {
        updateStep(stepId, 'done', instruction ? `已按「${instruction}」微调` : '已重新生成');
        btn.textContent = '重新生成 ↺';
        btn.disabled = false;
      }, 1200);
    }

    // ─── RENDER CARD ─────────────────────────────────────
    function str(v) {
      if (!v) return '';
      if (typeof v === 'string') return v;
      if (typeof v === 'object') return v.text || v.value || v.content || JSON.stringify(v);
      return String(v);
    }

    function buildCardInner(data) {
      const layout = data.layout || 'dual';
      const dark = data.dark || false;
      const icon = str(data.icon);
      const tc = dark ? 'rgba(255,255,255,0.9)' : 'rgba(0,0,0,0.9)';
      const sc = dark ? 'rgba(255,255,255,0.6)' : 'rgba(0,0,0,0.6)';
      data = { ...data,
        title: str(data.title), subtitle: str(data.subtitle),
        header: str(data.header), value: str(data.value),
        unit: str(data.unit), subtitle2: str(data.subtitle2),
        action: str(data.action), icon,
      };

      const wrap = document.createElement('div');
      wrap.style.cssText = 'position:absolute;inset:0;';

      const mk = (styles, text) => {
        const el = document.createElement('div');
        el.style.cssText = styles;
        if (text !== undefined) el.textContent = text;
        return el;
      };

      if (layout === 'single') {
        wrap.appendChild(mk(
          `position:absolute;left:14px;top:${data.alignBottom?'105px':'14px'};width:110px;` +
          `font-size:16px;font-weight:600;line-height:1.2;color:${tc};` +
          `overflow:hidden;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;`,
          data.title));
      } else if (layout === 'dual') {
        wrap.appendChild(mk(
          `position:absolute;left:14px;top:14px;width:110px;` +
          `font-size:16px;font-weight:600;line-height:1.25;color:${tc};` +
          `overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;`,
          data.title));
        wrap.appendChild(mk(
          `position:absolute;left:14px;top:57px;width:110px;` +
          `font-size:12px;font-weight:500;line-height:135%;color:${sc};` +
          `overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;`,
          data.subtitle || ''));
        if (data.action) wrap.appendChild(mk(
          `position:absolute;left:14px;bottom:14px;width:74px;height:30px;border-radius:999px;` +
          `background:${dark?'rgba(255,255,255,0.15)':'rgba(0,0,0,0.08)'};` +
          `display:flex;align-items:center;justify-content:center;` +
          `font-size:12px;font-weight:600;color:${dark?'rgba(255,255,255,0.9)':'rgba(0,0,0,0.8)'};`,
          data.action));
      } else if (layout === 'triple') {
        wrap.appendChild(mk(
          `position:absolute;left:14px;top:14px;width:110px;height:14px;` +
          `font-size:12px;font-weight:500;color:${tc};overflow:hidden;white-space:nowrap;`,
          data.header || data.title));
        wrap.appendChild(mk(
          `position:absolute;left:14px;top:30px;width:110px;height:24px;` +
          `font-size:20px;font-weight:600;color:${data.accentColor||tc};overflow:hidden;white-space:nowrap;`,
          data.value || ''));
        wrap.appendChild(mk(
          `position:absolute;left:14px;top:56px;width:110px;height:12px;` +
          `font-size:10px;font-weight:500;color:${sc};overflow:hidden;white-space:nowrap;`,
          data.subtitle || ''));
      } else if (layout === 'big') {
        wrap.appendChild(mk(
          `position:absolute;left:14px;top:14px;width:110px;height:14px;` +
          `font-size:12px;font-weight:500;color:${tc};`,
          data.header || data.title));
        const dw = document.createElement('div');
        dw.style.cssText = `position:absolute;left:14px;top:28px;width:110px;height:48px;display:flex;align-items:flex-end;gap:2px;`;
        const de = document.createElement('span');
        de.style.cssText = `font-size:40px;font-weight:500;line-height:1;color:${data.accentColor||tc};`;
        de.textContent = data.value || '';
        dw.appendChild(de);
        if (data.unit) {
          const ue = document.createElement('span');
          ue.style.cssText = `font-size:12px;font-weight:600;padding-bottom:6px;color:${tc};`;
          ue.textContent = data.unit;
          dw.appendChild(ue);
        }
        wrap.appendChild(dw);
        if (data.subtitle) wrap.appendChild(mk(
          `position:absolute;left:14px;top:98px;width:110px;height:12px;` +
          `font-size:10px;font-weight:500;color:${sc};overflow:hidden;white-space:nowrap;`,
          data.subtitle));
        if (data.subtitle2) wrap.appendChild(mk(
          `position:absolute;left:14px;top:112px;width:110px;height:12px;` +
          `font-size:10px;font-weight:500;color:${sc};overflow:hidden;white-space:nowrap;`,
          data.subtitle2));
      }

      if (icon) {
        const deco = document.createElement('div');
        deco.style.cssText = `position:absolute;right:14px;bottom:14px;font-size:24px;opacity:0.12;line-height:1;`;
        deco.textContent = icon;
        wrap.appendChild(deco);
      }
      return wrap;
    }

    function applyPreset(data) {
      currentCardData = data;
      const dark = data.dark || false;
      const bg = dark ? '#1c1c1e' : (data.bg || '#ffffff');

      // 1x
      // 2x via CSS scale
      const card2 = document.getElementById('previewCard2x');
      const inner2 = document.getElementById('cardInner2x');
      if (card2 && inner2) {
        card2.style.background = bg;
        inner2.innerHTML = '';
        const scaled = document.createElement('div');
        scaled.style.cssText = `width:138px;height:138px;position:relative;transform:scale(2);transform-origin:top left;`;
        scaled.appendChild(buildCardInner(data));
        inner2.appendChild(scaled);
      }

      // Phone widget
      ['phoneCardInner1'].forEach(id => {
        const pInner = document.getElementById(id);
        if (pInner) {
          pInner.innerHTML = '';
          pInner.appendChild(buildCardInner(data));
          pInner.parentElement.style.background = bg;
        }
      });
    }

    // ─── CHAT ────────────────────────────────────────────
    const chatHistory = [];

    function addMsg(text, type) {
      const container = document.getElementById('chatMessages');
      const div = document.createElement('div');
      div.className = `msg ${type}`;
      const now = new Date().toLocaleTimeString('zh', {hour:'2-digit', minute:'2-digit'});
      div.innerHTML = `<div class="msg-bubble">${text}</div><div class="msg-time">${now}</div>`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function addTyping() {
      const container = document.getElementById('chatMessages');
      const div = document.createElement('div');
      div.className = 'msg bot';
      div.id = 'typing-indicator';
      div.innerHTML = `<div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    // Simulate skill steps while waiting for API
    // Layout labels
    const LAYOUT_LABELS = { single: '单行标题', dual: '双行内容', triple: '三段式', big: '大数字突显' };

    // Tone axis labels
    const AXIS_LABELS = {
      VA: { 1: '信息展示', 2: '平衡呈现', 3: '视觉强刺激' },
      IS: { 1: '极简洁', 2: '标准密度', 3: '信息密集' },
      AA: { 1: '纯展示', 2: '轻引导', 3: '强操作引导' },
    };

    function updateStepsFromResponse(fullReply, textPart, cardData) {
      // 1. 需求分析 — 提取正文前两句
      const analyzeDesc = textPart
        ? textPart.split(/。|\n/)[0].trim().slice(0, 60)
        : null;

      // 2. 调性分析 — 提取 VA/IS/AA 分数
      const axisMatch = fullReply.match(/VA(\d)\+IS(\d)\+AA(\d)/);
      let toneDesc = null;
      if (axisMatch) {
        const va = axisMatch[1], is = axisMatch[2], aa = axisMatch[3];
        const vaLabel = AXIS_LABELS.VA[va] || `视觉张力 ${va}`;
        const isLabel = AXIS_LABELS.IS[is] || `信息密度 ${is}`;
        const aaLabel = AXIS_LABELS.AA[aa] || `行动引导 ${aa}`;
        toneDesc = `VA${va} 视觉张力·${vaLabel}<br>IS${is} 信息密度·${isLabel}<br>AA${aa} 行动引导·${aaLabel}`;
      }

      // 3. 布局规划
      let layoutDesc = null;
      if (cardData?.layout) {
        const ll = LAYOUT_LABELS[cardData.layout] || cardData.layout;
        layoutDesc = `选用 ${cardData.layout} 布局（${ll}）`;
        if (cardData.header) layoutDesc += `<br>主标题：${cardData.header}`;
        if (cardData.value)  layoutDesc += `<br>核心数据：${cardData.value}${cardData.unit || ''}`;
      }

      // 4. 配色方案
      let colorDesc = null;
      if (cardData?.accentColor || cardData?.bg) {
        colorDesc = '';
        if (cardData.accentColor) colorDesc += `强调色：${cardData.accentColor}`;
        if (cardData.bg)          colorDesc += `<br>背景色：${cardData.bg}`;
        if (cardData.dark)        colorDesc += `<br>深色模式已开启`;
      }

      // 5. 插图生成（占位）
      updateStep('illust', 'done', '待接入 Image 2 生成规则');

      // 6. 卡片渲染
      const fieldCount = cardData ? Object.keys(cardData).length : 0;
      const renderDesc = fieldCount ? `共输出 ${fieldCount} 个字段，138×138px 卡片已渲染` : '卡片已生成';

      // 回填真实内容
      if (analyzeDesc) updateStep('analyze', 'done', analyzeDesc);
      if (toneDesc)    updateStep('tone',    'done', toneDesc);
      if (layoutDesc)  updateStep('layout',  'done', layoutDesc);
      if (colorDesc)   updateStep('color',   'done', colorDesc);
      updateStep('render', 'done', renderDesc);
    }

    async function simulateProgress() {
      const steps = ['analyze','tone','layout','color','illust','render'];
      const descs = {
        analyze: '用户想要一张展示数据的桌面卡片',
        tone: '简洁现代，色彩干净',
        layout: '选用 triple 三段式布局',
        color: '主色 #7c6ef7，背景白色',
        illust: '插图生成中…',
        render: '卡片已生成',
      };
      // Init all pending
      const initStates = {};
      steps.forEach(s => initStates[s] = { status: 'pending', desc: null });
      renderSteps(initStates);
      showProgress();

      for (let i = 0; i < steps.length; i++) {
        updateStep(steps[i], 'running', null);
        await delay(400 + Math.random() * 300);
        updateStep(steps[i], 'done', descs[steps[i]]);
      }
    }

    function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;

      addMsg(text, 'user');
      chatHistory.push({ role: 'user', content: text });
      input.value = '';
      input.style.height = '';
      document.getElementById('suggestions').style.display = 'none';

      addTyping();
      simulateProgress(); // start progress alongside API call

      try {
        const token = localStorage.getItem('tos_token') || '';
        const res = await fetch('/api/chat', {
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          method: 'POST',
          body: JSON.stringify({ messages: chatHistory }),
        });
        const data = await res.json();
        removeTyping();

        if (!data.ok) {
          addMsg('出错了：' + (data.error || '请重试'), 'bot');
          return;
        }

        const reply = data.text;
        chatHistory.push({ role: 'assistant', content: reply });

        const cardMatch = reply.match(/```card-update\n([\s\S]*?)```/);
        let displayReply = reply.replace(/```card-update\n[\s\S]*?```/g, '').trim();
        addMsg(displayReply || '卡片已更新 ✨', 'bot');

        let cardData = null;
        if (cardMatch) {
          try {
            cardData = JSON.parse(cardMatch[1]);
            applyPreset({ ...cardData, dark: currentTheme === 'dark' });
          } catch(e) { console.warn('card parse error', e); }
        }
        updateStepsFromResponse(reply, displayReply, cardData);
      } catch(e) {
        removeTyping();
        addMsg('网络错误，请重试', 'bot');
      }
    }

    function sendSuggestion(el) {
      document.getElementById('chatInput').value = el.textContent;
      sendMessage();
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function autoResize(el) {
      el.style.height = '';
      el.style.height = Math.min(el.scrollHeight, 90) + 'px';
    }

    function exportCard() {
      alert('导出功能即将上线 🚀');
    }

    // AUTH
    function initAuth() {
      const token = localStorage.getItem('tos_token');
      const name  = localStorage.getItem('tos_name');
      if (token && name) {
        document.getElementById('loginOverlay').classList.add('hidden');
        showUserBar(name);
      }
    }
    function showUserBar(name) {
      const bar = document.getElementById('userBar');
      bar.classList.remove('hidden');
      document.getElementById('userName').textContent = name;
      document.getElementById('userAvatar').textContent = name[0].toUpperCase();
    }
    function showLogin() {
      document.getElementById('loginForm').style.display = '';
      document.getElementById('registerForm').style.display = 'none';
      document.getElementById('loginSubtitle').textContent = 'AI 卡片设计工具';
      document.getElementById('loginErr').textContent = '';
    }
    function showRegister() {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('registerForm').style.display = '';
      document.getElementById('loginSubtitle').textContent = '创建新账号';
      document.getElementById('registerErr').textContent = '';
    }
    async function doLogin() {
      const email    = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errEl    = document.getElementById('loginErr');
      errEl.textContent = '';
      if (!email || !password) { errEl.textContent = '请填写邮箱和密码'; return; }
      const btn = document.querySelector('#loginForm .login-btn');
      btn.textContent = '登录中...'; btn.disabled = true;
      try {
        const res  = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
        const data = await res.json();
        if (!data.ok) { errEl.textContent = data.error || '登录失败'; return; }
        localStorage.setItem('tos_token', data.token);
        localStorage.setItem('tos_name',  data.user.name);
        document.getElementById('loginOverlay').classList.add('hidden');
        showUserBar(data.user.name);
      } catch(e) { errEl.textContent = '网络错误，请重试'; }
      finally { btn.textContent = '登录'; btn.disabled = false; }
    }
    async function doRegister() {
      const name     = document.getElementById('regName').value.trim();
      const email    = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const errEl    = document.getElementById('registerErr');
      errEl.textContent = '';
      if (!name || !email || !password) { errEl.textContent = '请填写所有字段'; return; }
      const btn = document.querySelector('#registerForm .login-btn');
      btn.textContent = '提交中...'; btn.disabled = true;
      try {
        const res  = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, email, password }) });
        const data = await res.json();
        if (!data.ok) { errEl.textContent = data.error || '注册失败'; return; }
        errEl.style.color = '#01CB65';
        errEl.textContent = '注册成功！等待管理员审批后可登录';
      } catch(e) { errEl.textContent = '网络错误，请重试'; }
      finally { btn.textContent = '注册'; btn.disabled = false; }
    }
    function doLogout() {
      localStorage.removeItem('tos_token');
      localStorage.removeItem('tos_name');
      document.getElementById('userBar').classList.add('hidden');
      document.getElementById('loginOverlay').classList.remove('hidden');
      showLogin();
    }


    initAuth();
    // ─── INIT ─────────────────────────────────────────────
    applyPreset({
      layout: 'dual',
      title: '告诉我你想要的卡片',
      subtitle: '比如「天气卡片」或「步数统计」',
      icon: '🃏',
      bg: '#fff',
      dark: false
    });
  </script>

</body>
</html>
